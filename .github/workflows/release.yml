name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-windows

      - name: Build release binary
        run: cargo build -p spaceaway --release --target x86_64-pc-windows-msvc

      - name: Convert music WAV to OGG (shrink release ~1 GB → ~100 MB)
        shell: pwsh
        run: |
          choco install ffmpeg -y --no-progress
          $musicDir = "resources/sounds/music"
          if (Test-Path $musicDir) {
            Get-ChildItem "$musicDir/*.wav" | ForEach-Object {
              $ogg = [System.IO.Path]::ChangeExtension($_.FullName, ".ogg")
              Write-Host "Converting $($_.Name) -> $(Split-Path $ogg -Leaf)"
              ffmpeg -i $_.FullName -c:a libvorbis -q:a 6 $ogg -y -loglevel warning
              Remove-Item $_.FullName
            }
          }

      - name: Package release
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $dir = "SpaceAway-${version}-windows"
          New-Item -ItemType Directory -Path $dir
          Copy-Item "target/x86_64-pc-windows-msvc/release/spaceaway.exe" "$dir/"
          if (Test-Path "resources") {
            Copy-Item -Recurse "resources" "$dir/resources"
          }
          Compress-Archive -Path "$dir/*" -DestinationPath "${dir}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: SpaceAway-*-windows.zip

  create-release:
    name: Create GitHub Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-release

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          generate_release_notes: true
          files: SpaceAway-*-windows.zip
